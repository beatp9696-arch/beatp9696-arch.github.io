<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250" role="img" aria-label="MU memory chip monogram">
  <defs>
    <linearGradient id="mubg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1b33"/>
      <stop offset="1" stop-color="#05101f"/>
    </linearGradient>
    <linearGradient id="muchip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#2563c9"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="250" height="250" rx="52" fill="url(#mubg)"/>
  <!-- chip die with pins -->
  <g stroke="#22d3ee" stroke-width="5" stroke-linecap="round" opacity=".85">
    <line x1="92" y1="58" x2="92" y2="40"/><line x1="125" y1="58" x2="125" y2="40"/><line x1="158" y1="58" x2="158" y2="40"/>
    <line x1="92" y1="192" x2="92" y2="210"/><line x1="125" y1="192" x2="125" y2="210"/><line x1="158" y1="192" x2="158" y2="210"/>
    <line x1="58" y1="92" x2="40" y2="92"/><line x1="58" y1="125" x2="40" y2="125"/><line x1="58" y1="158" x2="40" y2="158"/>
    <line x1="192" y1="92" x2="210" y2="92"/><line x1="192" y1="125" x2="210" y2="125"/><line x1="192" y1="158" x2="210" y2="158"/>
  </g>
  <rect x="60" y="60" width="130" height="130" rx="18" fill="none" stroke="url(#muchip)" stroke-width="6"/>
  <text x="125" y="143" text-anchor="middle" font-family="'IBM Plex Sans Thai','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="62" fill="#e8f6ff" letter-spacing="2">MU</text>
</svg>
