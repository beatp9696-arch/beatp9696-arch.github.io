name: build & validate

# รัน build.py ทุกครั้งที่ push/PR เพื่อ:
#   1) generate sitemap/feed/toc/itemlist/thumbnail/stocks/hero ใหม่ + validate โครงสร้าง
#   2) ตรวจ "drift" — ถ้าไฟล์ที่ build.py generate ยังไม่ถูก commit (ลืมรัน build.py ก่อน push)
#      job จะ fail พร้อมบอกให้รัน build.py แล้ว commit
# หมายเหตุ: sitemap.xml / feed.xml มี field ที่ขึ้นกับเวลา/เครื่อง (lastmod, lastBuildDate)
# จึงไม่เอามา gate drift — gate เฉพาะไฟล์ที่ deterministic จาก source

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: ติดตั้ง ImageMagick (build.py ใช้แทน sips บน Linux สำหรับ thumbnail)
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: รัน build.py (generate + validate)
        run: python3 build.py

      - name: ตรวจ drift — ไฟล์ที่ generate ต้องถูก commit มาแล้ว
        run: |
          if ! git diff --exit-code -- \
              articles.html index.html stocks.html style.min.css articles/ scenes/*.min.css; then
            echo "::error::build.py แก้ไฟล์ด้านบน = ยังไม่ได้ commit ผล generate — รัน 'python3 build.py' แล้ว commit ก่อน push"
            exit 1
          fi
